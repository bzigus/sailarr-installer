# MediaManager Example Configuration File
# This file contains all available configuration options for MediaManager
# Documentation: https://maxdorninger.github.io/MediaManager/introduction.html
#
# This is an example configuration file that gets copied to your config folder
# on first boot. You should modify the values below to match your setup.

[misc]
# it's very likely that you need to change this for MediaManager to work
frontend_url = "http://localhost:8000" # note the lack of a trailing slash
cors_urls = ["http://localhost:8000"] # note the lack of a trailing slash

image_directory = "/data/images"
tv_directory = "/data/media/tv"
movie_directory = "/data/media/movies"
torrent_directory = "/data/media" # this is where MediaManager will search for the downloaded torrents and usenet files

# you probaly don't need to change this
development = false

# Custom Media Libraries
# These paths should match your volume mounts in docker-compose.yaml
# Example: if you mount "./movies:/media/movies" then use path = "/media/movies/subdirectory"
[[misc.tv_libraries]]
name = "TV Shows"
path = "/data/media/tv"  # Change this to match your actual TV shows location

[[misc.movie_libraries]]
name = "Movies"
path = "/data/media/movies"  # Change this to match your actual movies location

[database]
host = "db"
port = 5432
user = "MediaManager"
password = "MEDIAMANAGER_DB_PASSWORD_PLACEHOLDER"
dbname = "MediaManager"

[auth]
email_password_resets = false # if true, you also need to set up SMTP (notifications.smtp_config)

token_secret = "TOKEN_SECRET_PLACEHOLDER" # generate a random string with "openssl rand -hex 32", e.g. here https://www.cryptool.org/en/cto/openssl/
session_lifetime = 86400  # this is how long you will be logged in after loggin in, in seconds

# Admin users: Users who register with these email addresses will automatically become administrators
# If no users exist in the database, a default admin user with the email "admin@example.com" and the password "admin" will be created
admin_emails = ["admin@example.com"]

# OpenID Connect settings
[auth.openid_connect]
enabled = false
client_id = ""
client_secret = ""
configuration_endpoint = ""
name = "OpenID"

[notifications]
# SMTP settings for email notifications
[notifications.smtp_config]
smtp_host = ""
smtp_port = 587
smtp_user = ""
smtp_password = ""
from_email = ""
use_tls = true

# Email notification settings
[notifications.email_notifications]
enabled = false
emails = []

# Gotify notification settings
[notifications.gotify]
enabled = false
api_key = ""
url = ""

# Ntfy notification settings
[notifications.ntfy]
enabled = false
url = ""

# Pushover notification settings
[notifications.pushover]
enabled = false
api_key = ""
user = ""

[torrents]
# qBittorrent settings (Decypharr emulates qBittorrent protocol)
[torrents.qbittorrent]
enabled = true
host = "http://decypharr"
port = 8283
username = "http://mediamanager:8000"
password = "PROWLARR_API_KEY_PLACEHOLDER"

# Transmission settings
[torrents.transmission]
enabled = false
username = ""
password = ""
https_enabled = false
host = ""
port = 9091
path = "/transmission/rpc"

# SABnzbd settings
[torrents.sabnzbd]
enabled = false
host = ""
port = 8080
api_key = ""
base_path = "/api"

[indexers]
# Prowlarr settings
[indexers.prowlarr]
enabled = true
url = "http://prowlarr:9696"
api_key = "PROWLARR_API_KEY_PLACEHOLDER"
reject_torrents_on_url_error = true
timeout_seconds = 60
follow_redirects = false

# Jackett settings
[indexers.jackett]
enabled = false
url = ""
api_key = ""
indexers = []
timeout_seconds = 60

# Title-based scoring rules
[[indexers.title_scoring_rules]]
name = "prefer_h265"
keywords = ["h265", "hevc", "x265", "h.265", "x.265"]
score_modifier = 100
negate = false

[[indexers.title_scoring_rules]]
name = "avoid_cam"
keywords = ["cam", "ts"]
score_modifier = -10000
negate = false

# Indexer flag-based scoring rules
[[indexers.indexer_flag_scoring_rules]]
name = "reject_nuked"
flags = ["nuked"]
score_modifier = -10000
negate = false

# Scoring rulesets
[[indexers.scoring_rule_sets]]
name = "default"
libraries = ["ALL_TV", "ALL_MOVIES"]
rule_names = ["prefer_h265", "avoid_cam", "reject_nuked"]

# Metadata configuration
[metadata]
[metadata.tmdb]
tmdb_relay_url = "https://metadata-relay.dorninger.co/tmdb"

[metadata.tvdb]
tvdb_relay_url = "https://metadata-relay.dorninger.co/tvdb"
