# MediaManager Configuration File
# Documentation: https://maxdorninger.github.io/MediaManager/
# This file is automatically configured by the Sailarr Installer

[misc]
frontend_url = "http://localhost:8000"
cors_urls = ["http://localhost:8000"]

image_directory = "/data/images"
tv_directory = "/data/tv"
movie_directory = "/data/movies"
torrent_directory = "/data/torrents"

development = false

# Media Libraries
[[misc.tv_libraries]]
name = "TV Shows"
path = "/data/tv"

[[misc.movie_libraries]]
name = "Movies"
path = "/data/movies"

[database]
host = "mediamanager-db"
port = 5432
user = "MediaManager"
password = "MediaManager"
dbname = "MediaManager"

[auth]
email_password_resets = false

# IMPORTANT: Generate a secure random string with: openssl rand -hex 32
token_secret = "CHANGE_ME_GENERATE_RANDOM_STRING"
session_lifetime = 86400

# Admin users: Users who register with these email addresses will automatically become administrators
admin_emails = ["admin@example.com"]

# OpenID Connect settings
[auth.openid_connect]
enabled = false
client_id = ""
client_secret = ""
configuration_endpoint = ""
name = "OpenID"

[notifications]
# SMTP settings for email notifications
[notifications.smtp_config]
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_user = "admin"
smtp_password = "admin"
from_email = "mediamanager@example.com"
use_tls = true

# Email notification settings
[notifications.email_notifications]
enabled = false
emails = []

# Gotify notification settings
[notifications.gotify]
enabled = false
api_key = ""
url = ""

# Ntfy notification settings
[notifications.ntfy]
enabled = false
url = ""

# Pushover notification settings
[notifications.pushover]
enabled = false
api_key = ""
user = ""

[torrents]
# qBittorrent settings
[torrents.qbittorrent]
enabled = false
host = "http://localhost"
port = 8080
username = "admin"
password = "admin"

# Transmission settings
[torrents.transmission]
enabled = false
username = "admin"
password = "admin"
https_enabled = false
host = "localhost"
port = 9091
path = "/transmission/rpc"

# SABnzbd settings
[torrents.sabnzbd]
enabled = false
host = "http://localhost"
port = 8080
api_key = ""
base_path = "/api"

[indexers]
# Prowlarr settings - Will be configured automatically by the installer
[indexers.prowlarr]
enabled = false
url = "http://prowlarr:9696"
api_key = ""
reject_torrents_on_url_error = true
timeout_seconds = 60
follow_redirects = false

# Jackett settings
[indexers.jackett]
enabled = false
url = "http://localhost:9117"
api_key = ""
indexers = []
timeout_seconds = 60

# Title-based scoring rules
[[indexers.title_scoring_rules]]
name = "prefer_h265"
keywords = ["h265", "hevc", "x265", "h.265", "x.265"]
score_modifier = 100
negate = false

[[indexers.title_scoring_rules]]
name = "avoid_cam"
keywords = ["cam", "ts", "camrip", "hdcam"]
score_modifier = -10000
negate = false

[[indexers.title_scoring_rules]]
name = "prefer_remux"
keywords = ["remux"]
score_modifier = 200
negate = false

# Indexer flag-based scoring rules
[[indexers.indexer_flag_scoring_rules]]
name = "prefer_freeleech"
flags = ["freeleech", "freeleech75"]
score_modifier = 500
negate = false

[[indexers.indexer_flag_scoring_rules]]
name = "reject_nuked"
flags = ["nuked"]
score_modifier = -10000
negate = false

# Scoring rulesets
[[indexers.scoring_rule_sets]]
name = "default"
libraries = ["ALL_TV", "ALL_MOVIES"]
rule_names = ["prefer_h265", "avoid_cam", "prefer_freeleech", "reject_nuked"]

[metadata]
[metadata.tmdb]
tmdb_relay_url = "https://metadata-relay.dorninger.co/tmdb"
primary_languages = [""]
default_language = "en"

[metadata.tvdb]
tvdb_relay_url = "https://metadata-relay.dorninger.co/tvdb"
