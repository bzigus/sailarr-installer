# MediaManager - Unified Movie and TV Show Management
# Replaces Radarr and Sonarr with a single integrated service
# Project: https://github.com/maxdorninger/MediaManager

services:
  mediamanager:
    image: ${MEDIAMANAGER_IMAGE}:${MEDIAMANAGER_TAG}
    env_file:
      - ../.env.defaults
      - ../.env.local
    container_name: mediamanager
    cpus: 2.0
    networks:
      mediacenter:
        ipv4_address: 172.30.0.20
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--connect-timeout", "3", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
    - TZ=${TIMEZONE}
    - CONFIG_DIR=/app/config
    volumes:
    - ${ROOT_DIR}/config/mediamanager-config:/app/config
    - ${ROOT_DIR}/data/media/movies:/data/movies
    - ${ROOT_DIR}/data/media/tv:/data/tv
    - ${ROOT_DIR}/data/symlinks:/data/torrents
    - ${ROOT_DIR}/data/images:/data/images
    ports:
    - ${MEDIAMANAGER_PORT}:8000
    restart: on-failure:5
    logging:
      driver: local
      options:
        max-file: '5'
        max-size: 10m
    labels:
    - traefik.enable=true
    - traefik.http.routers.mediamanager.rule=Host(`${MEDIAMANAGER_TRAEFIK_NAME}.${DOMAIN_NAME}`)
    - traefik.http.routers.mediamanager.entrypoints=web
    - traefik.http.services.mediamanager.loadbalancer.server.port=8000
    depends_on:
      mediamanager-db:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
        restart: true
  
  mediamanager-db:
    image: ${MEDIAMANAGER_POSTGRES_IMAGE}:${MEDIAMANAGER_POSTGRES_TAG}
    container_name: mediamanager-db
    networks:
      mediacenter:
        ipv4_address: 172.30.0.21
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
    - POSTGRES_USER=${MEDIAMANAGER_DB_USER}
    - POSTGRES_DB=${MEDIAMANAGER_DB_NAME}
    - POSTGRES_PASSWORD=${MEDIAMANAGER_DB_PASSWORD}
    volumes:
    - ${ROOT_DIR}/config/mediamanager-db:/var/lib/postgresql/data
    restart: on-failure:5
    logging:
      driver: local
      options:
        max-file: '5'
        max-size: 10m
