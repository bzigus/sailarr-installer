# Traefik - Reverse Proxy

services:
  traefik:
    profiles:
      - traefik
    image: ${TRAEFIK_IMAGE}:${TRAEFIK_TAG}
    env_file:
      - ../.env.defaults
      - ../.env.local
    container_name: traefik
    user: "${TRAEFIK_UID}:${MEDIACENTER_GID}"
    restart: unless-stopped
    networks:
      mediacenter:
        ipv4_address: 172.30.0.3
    ports:
      - "${TRAEFIK_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://traefik-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=mediacenter"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/data/access.log"
    volumes:
      - ${ROOT_DIR}/config/traefik-data:/data
      - ${ROOT_DIR}/config/traefik-config:/config
    environment:
      - TZ=${TIMEZONE}
    healthcheck:
      test: ["CMD", "nc", "-vz", "127.0.0.1", "80"]
      start_period: 3s
      interval: 3s
      timeout: 3s
      retries: 5
    depends_on:
      traefik-socket-proxy:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_TRAEFIK_NAME}.${DOMAIN_NAME}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.services.traefik.loadbalancer.server.port=8080