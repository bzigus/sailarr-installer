# MediaManager PostgreSQL Database
# Required for MediaManager operation

services:
  mediamanager-postgres:
    image: ${MEDIAMANAGER_POSTGRES_IMAGE}:${MEDIAMANAGER_POSTGRES_TAG}
    env_file:
      - ../.env.defaults
      - ../.env.local
    container_name: mediamanager-postgres
    cpus: 1.0
    networks:
      mediacenter:
        ipv4_address: 172.30.0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d MediaManager -U MediaManager"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=MediaManager
      - POSTGRES_DB=MediaManager
      - POSTGRES_PASSWORD=${MEDIAMANAGER_DB_PASSWORD}
      - TZ=${TIMEZONE}
    volumes:
      - ${ROOT_DIR}/config/mediamanager-postgres:/var/lib/postgresql/data
    ports:
      - ${MEDIAMANAGER_POSTGRES_PORT}:5432
    restart: on-failure:5
    logging:
      driver: local
      options:
        max-file: '5'
        max-size: 10m
